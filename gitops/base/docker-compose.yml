version: "3.8"

# ── Production deployment (Dockerized MySQL + Monitoring) ──
# 1. Frontend    (nginx)        — static assets + reverse proxy
# 2. Backend     (node)         — Express API + Handlebars SSR
# 3. Database    (mysql)        — Dockerized MySQL with seed data
# 4. Prometheus                 — metrics collection
# 5. Grafana                    — dashboards + visualization
# 6. Node Exporter              — host metrics
# 7. Alertmanager               — alert routing

services:

  frontend:
    image: us-central1-docker.pkg.dev/expandox-cloudehub/expandox-cloudehub-docker/theepicbook-frontend:a12941ea159ef128059d0cad7fc080495f77932c
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - app-network

  backend:
    image: us-central1-docker.pkg.dev/expandox-cloudehub/expandox-cloudehub-docker/theepicbook-backend:a12941ea159ef128059d0cad7fc080495f77932c
    restart: unless-stopped
    environment:
      - PORT=8080
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      database:
        condition: service_healthy
    networks:
      - app-network

  database:
    image: us-central1-docker.pkg.dev/expandox-cloudehub/expandox-cloudehub-docker/theepicbook-database:a12941ea159ef128059d0cad7fc080495f77932c
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: bookstore
      MYSQL_USER: appuser
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - db-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # ── Prometheus ──────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: theepicbook-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../dev/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - ../dev/monitoring/alert.rules.yml:/etc/prometheus/alert.rules.yml
      - prometheus_data:/prometheus
    networks:
      - app-network

  # ── Grafana ─────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: theepicbook-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ../dev/monitoring/datasource.yml:/etc/grafana/provisioning/datasources/datasource.yml
    networks:
      - app-network

  # ── Node Exporter ───────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:latest
    container_name: theepicbook-node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    networks:
      - app-network

  # ── Alertmanager ────────────────────────────────────────────────
  alertmanager:
    image: prom/alertmanager:latest
    container_name: theepicbook-alertmanager
    restart: unless-stopped
    ports:
      - "9093:9093"
    volumes:
      - ../dev/monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml
    networks:
      - app-network

volumes:
  db-data:
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  app-network:
    driver: bridge
