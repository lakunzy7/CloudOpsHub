global:
  resolve_timeout: 5m
  slack_api_url: "SLACK_WEBHOOK_PLACEHOLDER"

route:
  receiver: slack-notifications
  group_by:
    - alertname
    - environment
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h

  routes:
    - match:
        severity: critical
      receiver: slack-critical

    - match:
        severity: warning
      receiver: slack-notifications

receivers:

  - name: slack-notifications
    slack_configs:
      - channel: "#cloudopshub-alerts"
        send_resolved: true
        title: >
          [{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}
        text: >
          *Environment:* {{ .GroupLabels.environment }}
          *Alert:* {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
        color: >
          {{ if eq .Status "firing" }}danger{{ else }}good{{ end }}

  - name: slack-critical
    slack_configs:
      - channel: "#cloudopshub-alerts"
        send_resolved: true
        title: >
          [CRITICAL] {{ .GroupLabels.alertname }}
        text: >
          *Environment:* {{ .GroupLabels.environment }}
          *Alert:* {{ range .Alerts }}{{ .Annotations.summary }}{{ end }}
          *Description:* {{ range .Alerts }}{{ .Annotations.description }}{{ end }}
        color: danger

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal:
      - alertname
      - environment
