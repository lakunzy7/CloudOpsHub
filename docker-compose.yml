version: "3.8"

# ── Local Development Stack ──
# Run: docker compose up --build
# App: http://localhost

services:

  frontend:
    build:
      context: ./nginx
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - app-network

  backend:
    build:
      context: ./theepicbook
    restart: unless-stopped
    environment:
      - PORT=8080
      - NODE_ENV=development
      - DATABASE_URL=mysql://appuser:devpassword@database:3306/bookstore
    networks:
      - app-network

  database:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: devpassword
      MYSQL_DATABASE: bookstore
      MYSQL_USER: appuser
      MYSQL_PASSWORD: devpassword
    volumes:
      - db-data:/var/lib/mysql
      - ./theepicbook/db/BuyTheBook_Schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./theepicbook/db/author_seed.sql:/docker-entrypoint-initdb.d/02-authors.sql
      - ./theepicbook/db/books_seed.sql:/docker-entrypoint-initdb.d/03-books.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

volumes:
  db-data:

networks:
  app-network:
    driver: bridge
