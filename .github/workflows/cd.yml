name: CD
on:
    workflow_run:
        workflows: [CI]
        types: [completed]
        branches: [main]

permissions:
    contents: write
    id-token: write

env:
    REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/expandox-cloudehub-docker

jobs:
    # ── Deploy Stage: Secure Cloud Config (Checkov + TFSec) ──
    terraform-security:
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        steps:
            - uses: actions/checkout@v4

            - name: Checkov Terraform scan
              uses: bridgecrewio/checkov-action@v12
              with:
                  directory: terraform/
                  framework: terraform
                  soft_fail: true

            - name: TFSec Terraform scan
              uses: aquasecurity/tfsec-action@v1.0.3
              with:
                  working_directory: terraform/
                  soft_fail: true

    deploy:
        needs: [terraform-security]
        runs-on: ubuntu-latest
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        environment: dev
        steps:
            - uses: actions/checkout@v4

            - name: Authenticate to Google Cloud
              uses: google-github-actions/auth@v2
              with:
                  workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
                  service_account: ${{ secrets.GCP_SA_EMAIL }}

            - name: Verify images exist in Artifact Registry
              run: |
                  IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
                  gcloud artifacts docker images describe \
                    $REGISTRY/theepicbook-backend:$IMAGE_TAG
                  gcloud artifacts docker images describe \
                    $REGISTRY/theepicbook-frontend:$IMAGE_TAG
                  gcloud artifacts docker images describe \
                    $REGISTRY/theepicbook-database:$IMAGE_TAG

            # ── Operate Stage: Fetch secrets from GCP Secret Manager ──
            - name: Fetch secrets from GCP Secret Manager
              run: |
                  DATABASE_URL=$(gcloud secrets versions access latest \
                    --secret="Expandox-Cloudehub-database-url-dev" \
                    --project=${{ secrets.GCP_PROJECT_ID }})
                  echo "::add-mask::$DATABASE_URL"
                  echo "DATABASE_URL=$DATABASE_URL" >> $GITHUB_ENV

            - name: Update GitOps manifests
              run: |
                  IMAGE_TAG=${{ github.event.workflow_run.head_sha }}
                  sed -i "s|image:.*theepicbook-backend.*|image: $REGISTRY/theepicbook-backend:$IMAGE_TAG|" \
                    gitops/base/docker-compose.yml
                  sed -i "s|image:.*theepicbook-frontend.*|image: $REGISTRY/theepicbook-frontend:$IMAGE_TAG|" \
                    gitops/base/docker-compose.yml
                  sed -i "s|image:.*theepicbook-database.*|image: $REGISTRY/theepicbook-database:$IMAGE_TAG|" \
                    gitops/base/docker-compose.yml

            - name: Commit and push manifest update
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add gitops/
                  git commit -m "chore: update image to ${{ github.event.workflow_run.head_sha }} [skip ci]" || exit 0
                  git push

            # GitOps sync agent on VM auto-detects the manifest commit
            # and redeploys within 60 seconds — no manual trigger needed
            - name: Write deploy script
              env:
                  GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
                  SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
              run: |
                  cat > /tmp/deploy.sh <<EOF
                  #!/bin/bash
                  set -e
                  cd /opt/cloudopshub
                  git pull origin main
                  echo 'GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}' > .env
                  chmod 600 .env
                  sed -i 's|\\\${SLACK_WEBHOOK_URL}|${SLACK_WEBHOOK_URL}|g' gitops/dev/monitoring/alertmanager.yml
                  docker-compose --env-file .env -f gitops/base/docker-compose.yml pull
                  docker-compose --env-file .env -f gitops/base/docker-compose.yml up -d
                  echo 'Deployment complete'
                  EOF
                  chmod +x /tmp/deploy.sh

            - name: Pre-generate SSH keys
              run: |
                  mkdir -p ~/.ssh
                  ssh-keygen -t rsa -b 3072 -f ~/.ssh/google_compute_engine -N "" -q

            - name: Copy and run deploy script
              run: |
                  unset DATABASE_URL
                  gcloud compute scp /tmp/deploy.sh expandox-cloudehub-app-dev:/tmp/deploy.sh \
                    --zone=us-central1-a \
                    --project=${{ secrets.GCP_PROJECT_ID }} \
                    --tunnel-through-iap \
                    --ssh-key-file=~/.ssh/google_compute_engine

                  gcloud compute ssh expandox-cloudehub-app-dev \
                    --zone=us-central1-a \
                    --project=${{ secrets.GCP_PROJECT_ID }} \
                    --tunnel-through-iap \
                    --ssh-key-file=~/.ssh/google_compute_engine \
                    --command="bash /tmp/deploy.sh && rm /tmp/deploy.sh"

            - name: GitOps sync notification
              run: |
                  echo "✅ Secrets injected and containers deployed."
                  echo "Monitoring stack (Prometheus, Grafana, Alertmanager) is starting."
